* { box-sizing: border-box; margin: 0; padding: 0; }
body { font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background: #1a1a18; color: #eee; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
.gate { max-width: 360px; width: 100%; text-align: center; }

button { width: 100%; margin-top: 12px; padding: 12px; background: #c94a2b; color: #fff; border: 0; border-radius: 8px; font: inherit; font-weight: 500; cursor: pointer; }
button:disabled { opacity: .5; cursor: wait; }
.err { color: #e8a090; font-size: 12px; margin-top: 8px; min-height: 14px; }
.shake { animation: shake .35s ease-in-out; }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
</style>

const KEY_CACHE = 'jp26.k';
function b64dec(s) { const bin = atob(s); const a = new Uint8Array(bin.length); for (let i=0;i<bin.length;i++) a[i]=bin.charCodeAt(i); return a; }
async function deriveKey(pw, salt) {
  const baseKey = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name:'PBKDF2', salt, iterations:200000, hash:'SHA-256' }, baseKey, { name:'AES-GCM', length:256 }, true, ['decrypt']);
}
async function tryDecrypt(pw) {
  const data = b64dec(BLOB);
  const salt = data.slice(0,16), iv = data.slice(16,28), ct = data.slice(28);
  const key = await deriveKey(pw, salt);
  const pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, ct);
  // cache key (NOT password) in sessionStorage
  const raw = await crypto.subtle.exportKey('raw', key);
  sessionStorage.setItem(KEY_CACHE, btoa(String.fromCharCode(...new Uint8Array(raw))) + '|' + btoa(String.fromCharCode(...salt)) + '|' + btoa(String.fromCharCode(...iv)));
  return new TextDecoder().decode(pt);
}
async function tryFromCache() {
  const c = sessionStorage.getItem(KEY_CACHE);
  if (!c) return null;
  try {
    const [k, s, i] = c.split('|').map(b => Uint8Array.from(atob(b), x=>x.charCodeAt(0)));
    const key = await crypto.subtle.importKey('raw', k, { name:'AES-GCM' }, false, ['decrypt']);
    const data = b64dec(BLOB);
    const ct = data.slice(28);
    const pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv: i }, key, ct);
    return new TextDecoder().decode(pt);
  } catch (e) { sessionStorage.removeItem(KEY_CACHE); return null; }
}
function unlock(html) {
  document.open(); document.write(html); document.close();
}
(async () => {
  const cached = await tryFromCache();
  if (cached) unlock(cached);
})();
document.getElementById('f').addEventListener('submit', async e => {
  e.preventDefault();
  const pw = document.getElementById('p').value;
  const btn = document.getElementById('b'); const err = document.getElementById('e');
  btn.disabled = true; btn.textContent = 'Unlocking…'; err.textContent = '';
  try {
    const html = await tryDecrypt(pw);
    unlock(html);
  } catch (ex) {
    err.textContent = 'Wrong passphrase.';
    document.getElementById('p').classList.add('shake');
    setTimeout(() => document.getElementById('p').classList.remove('shake'), 400);
    document.getElementById('p').select();
  } finally { btn.disabled = false; btn.textContent = 'Unlock'; }
});
